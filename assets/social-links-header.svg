<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 35" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400&amp;display=swap');

    .label {
      fill: #D45113;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: 400;
    }

    .dot {
      fill: #D45113;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: 400;
    }

    .dot1 { animation: pulse 2.4s ease-in-out infinite; }
    .dot2 { animation: pulse 2.4s ease-in-out 0.4s infinite; }
    .dot3 { animation: pulse 2.4s ease-in-out 0.8s infinite; }

    @keyframes pulse {
      0%, 20% { opacity: 0; }
      30%, 70% { opacity: 1; }
      80%, 100% { opacity: 0; }
    }
  </style>

  <text class="label" x="130" y="23" text-anchor="middle">Social Links</text>
  <text class="dot dot1" x="213" y="23">.</text>
  <text class="dot dot2" x="224" y="23">.</text>
  <text class="dot dot3" x="235" y="23">.</text>
</svg>
