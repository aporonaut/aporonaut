name: Update Chess Puzzle

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch puzzle and update README
        run: |
          python3 << 'PYEOF'
          import json, re, urllib.parse, urllib.request

          response = urllib.request.urlopen("https://api.chess.com/pub/puzzle")
          puzzle = json.loads(response.read())

          fen = puzzle["fen"]
          url = puzzle["url"]
          title = puzzle.get("title", "Daily Chess Puzzle")

          fen_encoded = urllib.parse.quote(fen)
          active_color = fen.split()[1]
          flip = "&flip=true" if active_color == "b" else ""
          dark_board = f"https://www.chess.com/dynboard?fen={fen_encoded}&board=walnut&piece=neo&size=3{flip}"
          light_board = f"https://www.chess.com/dynboard?fen={fen_encoded}&board=brown&piece=neo&size=3{flip}"

          replacement = (
              "<!-- CHESS_PUZZLE:START -->\n"
              "      <div align=\"center\">\n"
              "        <picture>\n"
              f"          <source media=\"(prefers-color-scheme: dark)\" srcset=\"{dark_board}\" />\n"
              f"          <img src=\"{light_board}\" alt=\"{title}\" width=\"360\" />\n"
              "        </picture>\n"
              "        <br />\n"
              f"        <a href=\"{url}\"><b>&#9823; Solve today's puzzle on Chess.com</b></a>\n"
              "      </div>\n"
              "      <!-- CHESS_PUZZLE:END -->"
          )

          with open("README.md", "r") as f:
              content = f.read()

          pattern = r"<!-- CHESS_PUZZLE:START -->.*?<!-- CHESS_PUZZLE:END -->"
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(content)

          print(f"Updated puzzle: {title}")
          print(f"FEN: {fen}")
          print(f"URL: {url}")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git diff --quiet || (git add README.md && git commit -m "chore: update daily chess puzzle" && git push)
