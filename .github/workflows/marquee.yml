name: Update Marquee Section

on:
  push:
    branches: [main]
    paths: ['README.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-marquees:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate marquee SVGs and update README
        run: python3 scripts/build_marquees.py

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git diff --quiet || (git add assets/marquees/ README.md && git commit -m "chore: update marquee section" && git push)
